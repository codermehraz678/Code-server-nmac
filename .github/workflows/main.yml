name: "☁️ macOS Remote Dev Environment"

on:
  workflow_dispatch:
    inputs:
      session-timeout:
        description: "Session duration (minutes, max 360)"
        required: false
        default: "360"
        type: choice
        options:
          - "60"
          - "120"
          - "240"
          - "360"
      code-server-port:
        description: "code-server port"
        required: false
        default: "8080"
        type: string

# ─────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   TS_AUTHKEY            – Tailscale auth key (reusable, ephemeral recommended)
#   CODE_SERVER_PASSWORD  – Password to protect code-server
#   ANTHROPIC_API_KEY     – API key for Claude CLI
# ─────────────────────────────────────────────────────────

jobs:
  remote-dev:
    name: "🖥️ Spawn Dev Machine"
    runs-on: macos-latest
    timeout-minutes: ${{ fromJSON(github.event.inputs.session-timeout || '360') }}

    env:
      WORKSPACE: /Users/runner/workspace
      PORT: ${{ github.event.inputs.code-server-port || '8080' }}
      TS_SOCKET: /var/run/tailscale/tailscaled.sock

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Workspace & Downloads ─────────────────────────
      - name: 📁 Prepare workspace and Downloads folder
        run: |
          mkdir -p "$WORKSPACE"
          mkdir -p ~/Downloads

          ln -sfn ~/Downloads "$WORKSPACE/Downloads"

          rsync -a --exclude='.git' "$GITHUB_WORKSPACE/" "$WORKSPACE/" 2>/dev/null || true

          echo "✅ Workspace ready at $WORKSPACE"
          ls -la "$WORKSPACE"

      # ── 3. Node.js ───────────────────────────────────────
      - name: ⬢ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 4. Tailscale (manual install for macOS) ──────────
      - name: 🔗 Install and connect Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          set -euo pipefail

          echo "📦 Installing Tailscale..."
          HOMEBREW_NO_AUTO_UPDATE=1 brew install tailscale

          sudo mkdir -p /var/run/tailscale

          echo "🚀 Starting tailscaled (userspace networking)..."
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --socket="$TS_SOCKET" \
            --tun=userspace-networking \
            --port=41641 \
            > /tmp/tailscaled.log 2>&1 &

          DAEMON_PID=$!

          echo "⏳ Waiting for tailscaled..."
          for i in $(seq 1 30); do
            if sudo tailscale --socket="$TS_SOCKET" status >/dev/null 2>&1; then
              echo "✅ tailscaled ready (${i}s)"
              break
            fi
            if ! kill -0 "$DAEMON_PID" 2>/dev/null; then
              echo "❌ tailscaled crashed. Log:"
              cat /tmp/tailscaled.log
              exit 1
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ tailscaled not ready after 30s. Log:"
              cat /tmp/tailscaled.log
              exit 1
            fi
            sleep 1
          done

          echo "🔑 Authenticating with Tailscale..."
          sudo tailscale --socket="$TS_SOCKET" up \
            --authkey="$TS_AUTHKEY" \
            --hostname=gh-macos-dev \
            --accept-routes

          echo ""
          echo "🌐 Tailscale status:"
          sudo tailscale --socket="$TS_SOCKET" status
          echo ""
          TSIP=$(sudo tailscale --socket="$TS_SOCKET" ip -4)
          echo "📍 Tailscale IPv4: $TSIP"

      # ── 5. Install code-server ───────────────────────────
      - name: 🖥️ Install code-server
        run: |
          echo "Installing code-server..."
          curl -fsSL https://code-server.dev/install.sh | sh
          code-server --version

      # ── 6. Install Claude CLI ────────────────────────────
      - name: 🤖 Install Claude CLI (claude-code)
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "Claude CLI version:"
          claude --version || echo "Installed (version check may require auth)"

      # ── 7. Persist env vars for interactive shells ───────
      - name: 🔐 Configure environment for interactive sessions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NPM_GLOBAL_BIN="$(npm prefix -g)/bin"

          PROFILE=~/.zshrc
          touch "$PROFILE"

          {
            echo ""
            echo "# ── GitHub Actions Dev Environment ──"
            printf 'export ANTHROPIC_API_KEY="%s"\n' "$ANTHROPIC_API_KEY"
            echo "export PATH=\"${NPM_GLOBAL_BIN}:\$PATH\""
            echo "export WORKSPACE=\"${WORKSPACE}\""
            echo "alias downloads='cd ~/Downloads && ls -la'"
            echo "alias ws='cd ${WORKSPACE} && ls -la'"
          } >> "$PROFILE"

          cp "$PROFILE" ~/.bashrc

          echo "✅ Shell environment configured"

      # ── 8. Configure & start code-server ─────────────────
      - name: 🚀 Start code-server
        env:
          PASSWORD: ${{ secrets.CODE_SERVER_PASSWORD }}
        run: |
          mkdir -p ~/.config/code-server

          PASSWORD="$PASSWORD" nohup code-server \
            --bind-addr "0.0.0.0:${PORT}" \
            --auth password \
            --disable-telemetry \
            "$WORKSPACE" \
            > /tmp/code-server.log 2>&1 &

          CODE_PID=$!
          sleep 4

          if kill -0 "$CODE_PID" 2>/dev/null; then
            echo "✅ code-server running (PID $CODE_PID)"
          else
            echo "❌ code-server failed to start"
            cat /tmp/code-server.log
            exit 1
          fi

      # ── 9. Install useful VS Code extensions ─────────────
      - name: 🧩 Install VS Code extensions
        run: |
          code-server --install-extension ms-python.python          || true
          code-server --install-extension esbenp.prettier-vscode    || true
          code-server --install-extension dbaeumer.vscode-eslint    || true
          code-server --install-extension eamodio.gitlens           || true
          echo "✅ Extensions installed"

      # ── 10. Print connection info ─────────────────────────
      - name: 📋 Display connection details
        run: |
          TAILSCALE_IP=$(sudo tailscale --socket="$TS_SOCKET" ip -4 2>/dev/null || echo "unknown")
          TAILSCALE_DNS=$(sudo tailscale --socket="$TS_SOCKET" status --self --json 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['Self']['DNSName'].rstrip('.'))" \
            2>/dev/null || echo "unknown")

          DIVIDER="════════════════════════════════════════════════════"

          echo ""
          echo "$DIVIDER"
          echo "  🖥️  REMOTE DEV ENVIRONMENT IS READY"
          echo "$DIVIDER"
          echo ""
          echo "  code-server (IP) :  http://${TAILSCALE_IP}:${PORT}"
          echo "  code-server (DNS):  http://${TAILSCALE_DNS}:${PORT}"
          echo ""
          echo "  Tailscale IP     :  ${TAILSCALE_IP}"
          echo "  Tailscale DNS    :  ${TAILSCALE_DNS}"
          echo ""
          echo "  Workspace        :  ${WORKSPACE}"
          echo "  Downloads        :  ${WORKSPACE}/Downloads  (→ ~/Downloads)"
          echo ""
          echo "  Claude CLI       :  type 'claude' in any terminal"
          echo ""
          echo "  Timeout          :  ${{ github.event.inputs.session-timeout || '360' }} min"
          echo ""
          echo "  🛑 To stop early :  touch ~/stop"
          echo "       or cancel the workflow from GitHub Actions UI"
          echo ""
          echo "$DIVIDER"

          echo "::notice title=🖥️ code-server URL::http://${TAILSCALE_IP}:${PORT}"
          echo "::notice title=🔗 Tailscale DNS::http://${TAILSCALE_DNS}:${PORT}"

      # ── 11. Keep alive loop ──────────────────────────────
      - name: ⏳ Keep session alive
        env:
          PASSWORD: ${{ secrets.CODE_SERVER_PASSWORD }}
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          echo "Session active — polling every 30s for ~/stop sentinel file..."
          echo "Runner will auto-terminate after ${{ github.event.inputs.session-timeout || '360' }} minutes."

          SECONDS_ALIVE=0

          while true; do
            if [ -f ~/stop ]; then
              echo "🛑 Stop file detected (~/stop). Shutting down gracefully."
              break
            fi

            # Health-check code-server
            if ! pgrep -f code-server > /dev/null 2>&1; then
              echo "⚠️  code-server process died — restarting..."
              PASSWORD="$PASSWORD" nohup code-server \
                --bind-addr "0.0.0.0:${PORT}" \
                --auth password \
                --disable-telemetry \
                "$WORKSPACE" \
                > /tmp/code-server.log 2>&1 &
              sleep 3
            fi

            # Health-check tailscaled
            if ! pgrep -f tailscaled > /dev/null 2>&1; then
              echo "⚠️  tailscaled died — restarting..."
              sudo mkdir -p /var/run/tailscale
              sudo tailscaled \
                --state=/tmp/tailscaled.state \
                --socket="$TS_SOCKET" \
                --tun=userspace-networking \
                --port=41641 \
                > /tmp/tailscaled.log 2>&1 &
              sleep 5
              sudo tailscale --socket="$TS_SOCKET" up \
                --authkey="$TS_AUTHKEY" \
                --hostname=gh-macos-dev \
                --accept-routes 2>/dev/null || true
            fi

            sleep 30
            SECONDS_ALIVE=$((SECONDS_ALIVE + 30))

            if [ $((SECONDS_ALIVE % 300)) -eq 0 ]; then
              MINS=$((SECONDS_ALIVE / 60))
              echo "💓 Heartbeat — alive for ${MINS} minutes"
            fi
          done

          echo "👋 Session ended after $((SECONDS_ALIVE / 60)) minutes."
